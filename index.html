<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grit.js - Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #f0f6fc; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; }
    .version-badge { background: #238636; color: #fff; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.875rem; margin-bottom: 2rem; display: inline-block; }
    .download-section { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
    .download-card { background: #161b22; border: 1px solid #30363d; border-radius: 0.75rem; padding: 1.5rem 2rem; min-width: 220px; text-align: center; }
    .download-card h3 { margin-bottom: 1rem; color: #f0f6fc; }
    .download-card .links { display: flex; flex-direction: column; gap: 0.5rem; }
    .download-card a { display: inline-block; background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 0.5rem 1rem; border-radius: 0.375rem; text-decoration: none; font-size: 0.875rem; transition: background 0.15s; }
    .download-card a:hover { background: #30363d; }
    .error { color: #f85149; margin-top: 1rem; }
    .loading { color: #8b949e; }
    #all-assets { margin-top: 2rem; text-align: center; }
    #all-assets a { color: #58a6ff; text-decoration: none; }
    #all-assets a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>grit.js</h1>
  <p class="subtitle">grit.js framework</p>
  <div id="version" class="version-badge loading">Fetching latest version...</div>

  <div id="downloads" class="download-section"></div>
  <div id="all-assets"></div>
  <p id="error" class="error" hidden></p>

  <script>
    const REPO = 'grit-js/grit.js';

    async function fetchLatestRelease() {
      const versionEl = document.getElementById('version');
      const downloadsEl = document.getElementById('downloads');
      const allAssetsEl = document.getElementById('all-assets');
      const errorEl = document.getElementById('error');

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);

        const release = await res.json();
        versionEl.textContent = release.tag_name;
        versionEl.classList.remove('loading');

        const assets = release.assets || [];

        const windows = assets.filter(a => /\.(msi|exe)$/i.test(a.name));
        const linux = assets.filter(a => /\.(deb|rpm|AppImage|tar\.gz|tar\.xz)$/i.test(a.name));

        if (windows.length > 0) {
          downloadsEl.appendChild(buildCard('Windows', windows));
        }
        if (linux.length > 0) {
          downloadsEl.appendChild(buildCard('Linux', linux));
        }

        if (windows.length === 0 && linux.length === 0) {
          if (assets.length > 0) {
            downloadsEl.appendChild(buildCard('Downloads', assets));
          } else {
            errorEl.textContent = 'No downloadable assets found in the latest release.';
            errorEl.hidden = false;
          }
        }

        allAssetsEl.innerHTML = `<a href="https://github.com/${REPO}/releases/tag/${encodeURIComponent(release.tag_name)}" target="_blank" rel="noopener">View all assets on GitHub</a>`;
      } catch (err) {
        versionEl.textContent = 'Error';
        versionEl.classList.remove('loading');
        errorEl.textContent = `Failed to fetch latest release: ${err.message}`;
        errorEl.hidden = false;
      }
    }

    function buildCard(title, assets) {
      const card = document.createElement('div');
      card.className = 'download-card';
      card.innerHTML = `<h3>${title}</h3>`;
      const links = document.createElement('div');
      links.className = 'links';
      for (const asset of assets) {
        const a = document.createElement('a');
        a.href = asset.browser_download_url;
        a.download = asset.name;
        a.textContent = asset.name;
        links.appendChild(a);
      }
      card.appendChild(links);
      return card;
    }

    fetchLatestRelease();
  </script>
</body>
</html>
